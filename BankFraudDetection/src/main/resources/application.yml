spring:
  application:
    name: bank-fraud-detection

  kafka:
    # The HOST listener advertised by the broker in docker-compose.yml.
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: fraud-engine
      auto-offset-reset: earliest          # a new consumer reads the topic from the beginning
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # JSON deserializer will only build objects from these packages (safety).
        spring.json.trusted.packages: "org.example.fraud.model"

    # Kafka Streams settings. Inert until a class is annotated @EnableKafkaStreams (Milestone 4).
    streams:
      application-id: fraud-streams
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde

  # In-memory H2: Spring Boot auto-configures the datasource from this block.
  datasource:
    url: jdbc:h2:mem:frauddb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update           # create/update tables from @Entity classes on startup
    open-in-view: false
  h2:
    console:
      enabled: true              # browse the DB at http://localhost:8080/h2-console

# Detection knobs — tunable during the demo, read later by the rules/scorer.
fraud:
  thresholds:
    high-amount: 10000
    velocity-count: 5
    velocity-window-seconds: 60
    alert-score: 0.5
