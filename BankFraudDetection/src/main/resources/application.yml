spring:
  application:
    name: bank-fraud-detection

  kafka:
    # The HOST listener advertised by the broker in docker-compose.yml.
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: fraud-engine
      auto-offset-reset: earliest          # a new consumer reads the topic from the beginning
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # JSON deserializer will only build objects from these packages (safety).
        spring.json.trusted.packages: "org.example.fraud.model"

    # Kafka Streams settings. Activated by @EnableKafkaStreams (KafkaStreamsConfig).
    streams:
      application-id: fraud-streams
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde

  # In-memory H2: Spring Boot auto-configures the datasource from this block.
  datasource:
    url: jdbc:h2:mem:frauddb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update           # create/update tables from @Entity classes on startup
    open-in-view: false
  h2:
    console:
      enabled: true              # browse the DB at http://localhost:8080/h2-console

# Detection knobs — tunable during the demo, read later by the rules/scorer.
fraud:
  generator:
    interval-ms: 1000            # one transaction per second (the @Scheduled tick)
    burst:
      every-n-ticks: 20          # ~1 tick in 20, fire a velocity BURST instead of a single tx
      size: 10                   # transactions in a burst (one account, all within one tick)
  thresholds:
    high-amount: 10000
    # Velocity: alert when an account exceeds `velocity-count` transactions within a
    # `velocity-window-seconds` tumbling window. Tuned so normal ~1 tx/s traffic (~2 per
    # account per 10s) stays well under 7, but a burst of 10 trips it.
    velocity-count: 7
    velocity-window-seconds: 10
    # Amount anomaly: flag amount > mean + (anomaly-stddevs)*stddev of the account's history,
    # but only after anomaly-min-samples observations (early stats are meaningless).
    anomaly-stddevs: 3
    anomaly-min-samples: 30
    alert-score: 0.5
  weights:                 # per-rule contribution to the 0..1 score (DESIGN §6); summed, capped at 1.0
    high-amount: 0.5
    velocity: 0.7
    impossible-travel: 0.9
    blacklist: 1.0
    amount-anomaly: 0.6
    home-country: 0.2
