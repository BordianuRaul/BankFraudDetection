spring:
  application:
    name: bank-fraud-detection

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: fraud-engine
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "org.example.fraud.model"

    streams:
      application-id: fraud-streams
      properties:
        default.key.serde: org.apache.kafka.common.serialization.Serdes$StringSerde

  datasource:
    url: jdbc:h2:mem:frauddb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  h2:
    console:
      enabled: true

fraud:
  generator:
    interval-ms: 1000
    burst:
      every-n-ticks: 20
      size: 10
  thresholds:
    high-amount: 10000
    velocity-count: 7
    velocity-window-seconds: 10
    anomaly-stddevs: 3
    anomaly-min-samples: 30
    alert-score: 0.5
  weights:
    high-amount: 0.5
    velocity: 0.7
    impossible-travel: 0.9
    blacklist: 1.0
    amount-anomaly: 0.6
    home-country: 0.2
